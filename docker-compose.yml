version: '3.8'

services:
  db:
    image: postgres:15
    container_name: task_manager_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend

  redis:
    image: redis:7
    container_name: task_manager_redis
    restart: unless-stopped
    networks:
      - backend

  django:
    build: .
    container_name: task_manager_django
    command: >
      sh -c "while ! nc -z db 5432; do echo 'Waiting for database...'; sleep 2; done;
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn task_manager.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - backend

  celery:
    build: .
    container_name: task_manager_celery
    command: celery -A task_manager worker -l info
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: task_manager_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - django
    networks:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  backend:
